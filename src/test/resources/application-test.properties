spring:
  application:
    name: quizopia-backend

  # Test database configuration - sử dụng H2 in-memory cho test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 console cho debug
  h2:
    console:
      enabled: true

  # JPA configuration cho test
  jpa:
    hibernate:
      ddl-auto: create-drop  # Tự động tạo schema trong test
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  # Không cần Redis cho test đơn giản
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

# Flyway disabled cho test (sử dụng ddl-auto=create-drop thay thế)
spring.flyway.enabled: false

# Logging
logging:
  level:
    com.hhtuann.backend: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
