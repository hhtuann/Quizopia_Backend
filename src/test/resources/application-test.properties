spring.application.name=quizopia-backend

# JPA: Hibernate only validates mappings; Flyway owns the schema.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# Flyway: migrations V1-V4 create the real schema in the PostgreSQL container.
spring.flyway.enabled=true

# Logging
logging.level.com.hhtuann.backend=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=OFF

# ============================================================
# TEST-ONLY security keys.
# These are fixed, publicly-known test fixtures (32 zero bytes
# / 32 'B' bytes). They MUST NEVER be used outside tests and are
# not loaded in any non-test profile. Production secrets come
# from environment variables only.
# ============================================================
# 32 bytes of 0x42 ('B'); satisfies HS256 minimum of 32 bytes.
quizopia.security.jwt.secret-base64=QkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkI=
quizopia.security.jwt.access-token-lifetime=15m
quizopia.security.jwt.issuer=quizopia-backend
quizopia.security.jwt.audience=quizopia-web
# Exactly 32 bytes of zeros; satisfies 256-bit AES requirement.
quizopia.security.encryption.key-base64=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
quizopia.security.refresh-token.family-lifetime=7d
quizopia.security.lockout.threshold=5
quizopia.security.lockout.duration=15m
quizopia.security.cookie.name=quizopia_refresh
quizopia.security.cookie.http-only=true
quizopia.security.cookie.same-site=Lax
quizopia.security.cookie.path=/api/auth
quizopia.security.cookie.secure=false
quizopia.security.cors.allowed-origins=http://localhost:3000
# MockMvc requests carry no browser Origin header; allow server-to-server style calls.
quizopia.security.cors.allow-missing-origin=true
quizopia.security.teacher-invite.code=test-teacher-invite-code-only
quizopia.security.production=false
