spring.application.name=quizopia-backend

# JPA: Hibernate only validates mappings; Flyway owns the schema.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# Flyway: migrations V1-V4 create the real schema in the PostgreSQL container.
spring.flyway.enabled=true

# Logging
logging.level.com.hhtuann.backend=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=OFF
