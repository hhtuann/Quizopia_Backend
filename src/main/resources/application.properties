spring.application.name=quizopia-backend

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/quizopia_db}
spring.datasource.username=${DB_USERNAME:quiz_user}
spring.datasource.password=${DB_PASSWORD:quiz_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.baseline-on-migrate=false

# Disable schema.sql and data.sql initialization
spring.sql.init.mode=never

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:redis_password}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always