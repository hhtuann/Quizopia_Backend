spring.application.name=quizopia-backend

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/quizopia_db}
spring.datasource.username=${DB_USERNAME:quiz_user}
spring.datasource.password=${DB_PASSWORD:quiz_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.baseline-on-migrate=false

# Disable schema.sql and data.sql initialization
spring.sql.init.mode=never

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:redis_password}

# Actuator
# Health is public (permitAll). Details are only shown to authenticated callers so
# anonymous requests cannot learn db/redis component state; `info` is not exposed.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when_authorized

# ============================================================
# Quizopia security configuration.
# Secrets are read from environment variables only; never commit
# real secrets. Missing required secrets cause fail-fast startup.
# ============================================================
quizopia.security.production=false
# Required: Base64 of at least 32 bytes.
quizopia.security.jwt.secret-base64=${QUIZOPIA_JWT_SECRET_BASE64}
quizopia.security.jwt.access-token-lifetime=15m
quizopia.security.jwt.issuer=quizopia-backend
quizopia.security.jwt.audience=quizopia-web
# HS256 is the only supported algorithm (hardcoded in JwtConfig/JwtAccessTokenService);
# no `algorithm` property is exposed to avoid implying it is configurable.
# Required: Base64 of exactly 32 bytes.
quizopia.security.encryption.key-base64=${QUIZOPIA_DATA_ENCRYPTION_KEY_BASE64}
quizopia.security.refresh-token.family-lifetime=7d
quizopia.security.lockout.threshold=5
quizopia.security.lockout.duration=15m
quizopia.security.cookie.name=quizopia_refresh
quizopia.security.cookie.http-only=true
quizopia.security.cookie.same-site=Lax
quizopia.security.cookie.path=/api/auth
quizopia.security.cookie.secure=${QUIZOPIA_COOKIE_SECURE:false}
quizopia.security.cors.allowed-origins=${QUIZOPIA_ALLOWED_ORIGINS:http://localhost:3000}
# When false, refresh/logout require a valid Origin header. Tests set this true.
quizopia.security.cors.allow-missing-origin=false
# Required: invite code needed to create a TEACHER account.
quizopia.security.teacher-invite.code=${QUIZOPIA_TEACHER_INVITE_CODE}